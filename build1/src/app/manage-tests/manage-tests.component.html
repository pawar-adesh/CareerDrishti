
<div>
  <button style="color: #fff;" data-bs-toggle="modal" data-bs-target="#updateQueModal" class="btn btn-info" (click)="activateAdd()">Add</button>
</div>
<table class="table mt-3">

  <thead>
    <tr>
      <th scope="col">Question ID</th>
      <th scope="col">Question </th>
      <th scope="col">Field</th>
      <th scope="col">Action</th>
   </tr>
  </thead>

  <tbody>
    <tr *ngFor="let que of questionData">
      <td>{{que.quetsionID}}</td>
      <td>{{que.question}}</td>
      <td>{{que.questionField}}</td>
      <td>
        <button style="color: #fff;" data-bs-toggle="modal" data-bs-target="#updateQueModal" class="btn btn-info" (click)="onEdit(que)">Edit</button>
        <button style="color: #fff;" class="btn btn-danger mx-3" (click)="deleteQuestion(que)">Delete</button>
    </td>
    </tr>
  </tbody>
</table>



<div class="modal fade" id="updateQueModal" tabindex="-1" aria-labelledby="updateQueModalLabel" aria-hidden="true">
  <div class="modal-dialog">
      <div class="modal-content">
          <div class="modal-header">
              <h5 class="modal-title">Employee Details</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
              <form [formGroup]="formValue">
                  <div class="mb-3">
                      <label for="questionID" class="form-label">Question ID</label>
                      <input type="text" formControlName="queID" class="form-control" id="questionID" [readOnly]="true" value="{{questionData?.length + 1}}">
                  </div>
                  <div class="mb-3">
                      <label for="queDesc" class="form-label">Question</label>
                      <!-- <textarea name="" id="" cols="30" rows="10"></textarea> -->
                      <input type="text" formControlName="question" class="form-control" id="queDesc">
                  </div>
                  <!-- <div class="mb-3">
                      <label for="field" class="form-label">Question Field</label>
                      <input type="text" formControlName="questionField" class="form-control" id="field">
                  </div> -->
                  <select class="form-select" aria-label="Select fields">
                    <option selected class="text-secondary">select question field</option>
                    <option value="Agriculture">Agriculture</option>
                    <option value="Arts & Humanity">Arts & Humanity</option>
                    <option value="Commerce">Commerce</option>
                    <option value="Fine Arts">Fine Arts</option>
                    <option value="Health & Lifecycle">Health & Lifecycle</option>
                    <option value="Technical">Technical</option>
                    <option value="Uniform Service">Uniform Service</option>
                  </select>
              </form>
          </div>
          <div class="modal-footer">
              <button id="close" type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
              <button type="button" *ngIf="isAdded" (click)="addQuestions()" class="btn btn-primary">Add</button>
              <button type="button" *ngIf="isUpdated" (click)="editQuestion()" class="btn btn-primary">Update</button>
          </div>
      </div>
  </div>
